<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="logo/favicon.ico" />
    <link
      rel="icon"
      href="logo/favicon.ico"
      sizes="32x32"
      type="image/x-icon"
    />
    <link rel="icon" href="logo/qoc-logo.png" sizes="any" type="image/png" />
    <link rel="apple-touch-icon" href="logo/qoc-logo.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

      referrerpolicy="no-referrer"
    />
    <title>Queens of Change Foundation</title>
    <link rel="stylesheet" href="landingPage.css" />
  </head>
  <body>
    <div class="btnDark">
      <button class="light" onclick="toggleDarkMode()">
        <i class="fa-solid fa-sun"></i> <span class="mode-text">Dark Mode</span>
      </button>
    </div>
    <header>
      <div class="logo">
        <img src="logo/QOC LOGO.jpeg" alt="Logo" />
        <div class="name">
          <p class="name-main">Queens Of Change</p>
          <p class="name-lower">Foundation</p>
        </div>
      </div>
      <div class="nav">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About us</a></li>
          <li><a href="#">Our Work</a></li>
          <li><a href="#">Impact</a></li>
          <li><a href="#">Donate</a></li>
        </ul>
      </div>
      <div class="smallNav">
        <i class="fa-solid fa-bars"></i>
      </div>
      <div class="smallNavSec">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About us</a></li>
          <li><a href="#">Our Work</a></li>
          <li><a href="#">Impact</a></li>
          <li><a href="#">Donate</a></li>
        </ul>
      </div>
    </header>

    <div class="mainContant">
      <section class="landing">
        <div class="content">
          <h1>Queens of Change Foundation</h1>
          <p>Creating Hope, Equality & Opportunities</p>
          <button>Join Us</button>
        </div>
      </section>
    </div>

    <script src="landingPage.js" defer></script>

</html>
